<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3E2723">
<title>Cardápio Digital - Faça seu Pedido</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Pacifico&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>

<style>
  :root {
      --primary: #8D6E63; --accent: #D88D98; --bg-dark: #F5F5F5;
      --card-bg: #FFFFFF; --text-main: #333333;
      --success: #4CAF50; --danger: #EF5350; --warning: #FFCA28;
  }

  body { font-family: 'Poppins', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding-bottom: 80px; }

  /* CABEÇALHO DA LOJA */
  .header-loja { background: #3E2723; color: #fff; padding: 20px 15px; text-align: center; border-bottom: 4px solid var(--accent); position: relative; overflow: hidden; }
  .header-loja::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: var(--bg-logo); background-size: cover; background-position: center; opacity: 0.1; z-index: 0; }
  .logo-loja { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; position: relative; z-index: 1; background: #fff; }
  .titulo-loja { font-family: 'Pacifico', cursive; font-size: 28px; margin: 10px 0 0 0; position: relative; z-index: 1; color: var(--accent); }
  .desc-loja { font-size: 12px; color: #ccc; margin: 5px 0 0 0; position: relative; z-index: 1; }

  .container { max-width: 600px; margin: 0 auto; padding: 15px; }

  /* PRODUTOS */
  .produto-card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--accent); }
  .produto-info { flex: 1; padding-right: 15px; }
  .produto-nome { font-size: 16px; font-weight: 800; margin: 0 0 5px 0; color: #3E2723; }
  .produto-ingred { font-size: 11px; color: #777; margin: 0 0 8px 0; font-style: italic; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .produto-preco { font-size: 16px; font-weight: 900; color: var(--success); margin: 0; }
  .btn-add { background: var(--accent); color: #fff; border: none; width: 45px; height: 45px; border-radius: 10px; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(216, 141, 152, 0.4); display: flex; align-items: center; justify-content: center; }
  .btn-add:active { transform: scale(0.95); }

  /* BARRA FLUTUANTE CARRINHO */
  .carrinho-float { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: #3E2723; color: #fff; padding: 15px 20px; border-radius: 30px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; cursor: pointer; }
  .carrinho-float .total-itens { background: var(--accent); color: #fff; font-weight: bold; padding: 4px 10px; border-radius: 20px; font-size: 14px; }
  .carrinho-float .total-valor { font-size: 18px; font-weight: 900; }

  /* TELA DE CHECKOUT (MODAL) */
  .modal-checkout { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #F5F5F5; z-index: 9999; display: none; flex-direction: column; overflow-y: auto; }
  .checkout-header { background: #3E2723; color: #fff; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
  .checkout-content { padding: 15px; max-width: 600px; margin: 0 auto; width: 100%; box-sizing: border-box; }
  
  .item-carrinho { background: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; }
  .item-carrinho-nome { font-weight: bold; font-size: 14px; color: #333; }
  .item-carrinho-obs { font-size: 11px; color: #888; font-style: italic; margin-top: 2px; }
  .item-carrinho-preco { font-weight: bold; color: var(--success); font-size: 14px; }
  .btn-remove { background: #ffebee; color: var(--danger); border: none; padding: 5px 10px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; }

  /* FORMULÁRIO CHECKOUT */
  .form-section { background: #fff; padding: 15px; border-radius: 12px; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
  .form-section h4 { margin: 0 0 15px 0; color: #3E2723; border-bottom: 2px solid var(--accent); padding-bottom: 5px; }
  .input-group { margin-bottom: 12px; }
  .input-group label { display: block; font-size: 12px; color: #555; margin-bottom: 5px; font-weight: bold; }
  .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 14px; box-sizing: border-box; background: #fafafa; }
  .input-group input:focus, .input-group select:focus { border-color: var(--accent); outline: none; background: #fff; }
  
  .radio-box { display: flex; gap: 10px; margin-bottom: 15px; }
  .radio-box label { flex: 1; text-align: center; background: #f0f0f0; padding: 12px; border-radius: 8px; border: 2px solid #ddd; cursor: pointer; font-weight: bold; font-size: 13px; color: #555; transition: 0.2s; }
  .radio-box input { display: none; }
  .radio-box input:checked + label { background: #fff4f5; border-color: var(--accent); color: var(--accent); }

  .btn-finalizar { background: var(--success); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 900; margin-top: 20px; margin-bottom: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4); text-transform: uppercase; }
  
  /* SPINNER */
  .loader-container { text-align: center; padding: 50px; color: #888; }
  .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px auto; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header-loja" id="headerLoja">
    <img id="logoLoja" src="https://via.placeholder.com/90" class="logo-loja" alt="Logo">
    <h1 id="nomeLoja" class="titulo-loja">Carregando...</h1>
    <p id="descLoja" class="desc-loja">Faça seu pedido online de forma rápida!</p>
</div>

<div class="container">
    <h3 style="color: #3E2723; margin-top: 5px;">Nosso Cardápio 🍔</h3>
    
    <div id="listaProdutos">
        <div class="loader-container">
            <div class="spinner"></div>
            <p>Carregando delícias...</p>
        </div>
    </div>
</div>

<div class="carrinho-float" id="carrinhoFloat" onclick="abrirCheckout()">
    <div style="display:flex; align-items:center; gap:10px;">
        <span style="font-size:24px;">🛒</span>
        <span class="total-itens" id="cartBadge">0</span>
    </div>
    <div style="text-align:right;">
        <div style="font-size:10px; opacity:0.8; text-transform:uppercase;">Ver Carrinho</div>
        <div class="total-valor" id="cartTotalFloat">R$ 0,00</div>
    </div>
</div>

<div class="modal-checkout" id="modalCheckout">
    <div class="checkout-header">
        <button onclick="fecharCheckout()" style="background:transparent; border:none; color:#fff; font-size:20px; cursor:pointer;">⬅ Voltar</button>
        <span>Seu Pedido</span>
        <div style="width: 20px;"></div> </div>
    
    <div class="checkout-content">
        <div style="margin-bottom: 20px;">
            <h4 style="color:#3E2723; margin-bottom:10px;">Itens Selecionados:</h4>
            <div id="listaItensCheckout"></div>
            <div style="text-align: right; font-size: 22px; font-weight: 900; color: #3E2723; margin-top: 15px; border-top: 2px dashed #ccc; padding-top: 10px;">
                Total: <span id="valorTotalCheckout" style="color:var(--success);">R$ 0,00</span>
            </div>
        </div>

        <div class="form-section">
            <h4>Como deseja receber?</h4>
            <div class="radio-box">
                <input type="radio" id="modoMesa" name="modoEntrega" value="mesa" checked onchange="mudarModoEntrega()">
                <label for="modoMesa">🪑 Estou na Loja / Mesa</label>
                
                <input type="radio" id="modoDelivery" name="modoEntrega" value="delivery" onchange="mudarModoEntrega()">
                <label for="modoDelivery">🛵 Delivery</label>
            </div>

            <div id="areaMesa">
                <div class="input-group">
                    <label>Seu Nome ou Número da Mesa *</label>
                    <input type="text" id="cliNomeMesa" placeholder="Ex: Mesa 05 ou João">
                </div>
            </div>

            <div id="areaDelivery" style="display:none;">
                <div class="input-group">
                    <label>Seu Nome Completo *</label>
                    <input type="text" id="cliNome">
                </div>
                <div class="input-group">
                    <label>WhatsApp *</label>
                    <input type="tel" id="cliZap" placeholder="(00) 00000-0000">
                </div>
                <div style="display:flex; gap:10px;">
                    <div class="input-group" style="flex:1;">
                        <label>CEP</label>
                        <input type="tel" id="cliCep" placeholder="00000-000" onblur="buscarCepDelivery()">
                    </div>
                    <div class="input-group" style="flex:2;">
                        <label>Bairro *</label>
                        <input type="text" id="cliBairro">
                    </div>
                </div>
                <div class="input-group">
                    <label>Rua e Número *</label>
                    <input type="text" id="cliRua" placeholder="Ex: Rua das Flores, 123">
                </div>
                <div class="input-group">
                    <label>Ponto de Referência / Complemento</label>
                    <input type="text" id="cliRef">
                </div>
            </div>

            <h4 style="margin-top: 20px;">Pagamento (Pague na entrega)</h4>
            <div class="input-group">
                <select id="cliPagamento">
                    <option value="PIX">💠 Vou pagar no PIX</option>
                    <option value="CARTAO">💳 Vou passar o Cartão</option>
                    <option value="DINHEIRO">💵 Vou pagar em Dinheiro</option>
                </select>
            </div>
            <div class="input-group" id="areaTroco" style="display:none;">
                <label>Precisa de troco para quanto?</label>
                <input type="number" id="cliTroco" placeholder="Ex: 50">
            </div>

        </div>

        <button class="btn-finalizar" onclick="enviarPedido()">✅ FINALIZAR PEDIDO</button>
    </div>
</div>

<script>
  // ================= CONFIGURAÇÃO FIREBASE (A MESMA DO ADMIN) =================
  const firebaseConfig = {
    apiKey: "AIzaSyCzVRXFXsD1dAgy4cyvSF0qjZwb2sVdB_E",
    authDomain: "sistema-de-pastelaria.firebaseapp.com",
    projectId: "sistema-de-pastelaria",
    storageBucket: "sistema-de-pastelaria.firebasestorage.app",
    messagingSenderId: "857527247447",
    appId: "1:857527247447:web:7b055dd4f3bdabc5f17912"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let catalogoLoja = [];
  let carrinho = [];
  let numPedidoAtual = 1;
  let foneLoja = "";

  // MASCARAS
  $(document).ready(function(){
      $('#cliZap').mask('(00) 00000-0000');
      $('#cliCep').mask('00000-000');
  });

  // ================= INICIALIZAÇÃO =================
  function carregarDadosLoja() {
      // Carrega Configurações (Logo e Nome)
      db.collection("config").doc("empresa").onSnapshot((doc) => {
          if(doc.exists) {
              let d = doc.data();
              document.getElementById('nomeLoja').innerText = d.nome || "Cardápio";
              document.title = d.nome + " - Cardápio";
              if(d.logo) {
                  document.getElementById('logoLoja').src = d.logo;
                  document.body.style.setProperty('--bg-logo', `url(${d.logo})`);
              }
              if(d.tel) foneLoja = d.tel.replace(/\D/g, ''); // Guarda o zap da loja
              if(d.contador !== undefined) numPedidoAtual = d.contador + 1;
          }
      });

      // Carrega Produtos em Tempo Real
      db.collection("catalogo").orderBy("nome").onSnapshot((snap) => {
          catalogoLoja = [];
          snap.forEach(d => catalogoLoja.push({id: d.id, ...d.data()}));
          renderizarProdutos();
      });
  }

  // ================= RENDERIZAR CARDÁPIO =================
  function renderizarProdutos() {
      const div = document.getElementById('listaProdutos');
      div.innerHTML = '';
      
      if(catalogoLoja.length === 0) {
          div.innerHTML = '<p style="text-align:center; color:#888;">Nenhum produto disponível no momento.</p>';
          return;
      }

      catalogoLoja.forEach(p => {
          div.innerHTML += `
              <div class="produto-card">
                  <div class="produto-info">
                      <h4 class="produto-nome">${p.nome}</h4>
                      <p class="produto-ingred">${p.ingredientes || ''}</p>
                      <p class="produto-preco">${formatarMoeda(p.valor)}</p>
                  </div>
                  <button class="btn-add" onclick="modalAddProduto('${p.id}')">+</button>
              </div>
          `;
      });
  }

  // ================= ADICIONAR AO CARRINHO =================
  function modalAddProduto(id) {
      let p = catalogoLoja.find(x => x.id === id);
      
      Swal.fire({
          title: p.nome,
          html: `
              <div style="text-align:left; font-size:13px; color:#555; margin-bottom:15px; font-style:italic;">${p.ingredientes || ''}</div>
              <div style="text-align:left; font-weight:bold; font-size:20px; color:#4CAF50; margin-bottom:15px;">${formatarMoeda(p.valor)}</div>
              
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; background:#f5f5f5; padding:10px; border-radius:8px;">
                  <span style="font-weight:bold; color:#333;">Quantidade:</span>
                  <div style="display:flex; align-items:center; gap:10px;">
                      <button onclick="document.getElementById('qtdModal').value = Math.max(1, parseInt(document.getElementById('qtdModal').value)-1)" style="width:30px; height:30px; border-radius:5px; border:1px solid #ccc; background:#fff; font-weight:bold;">-</button>
                      <input type="number" id="qtdModal" value="1" min="1" readonly style="width:40px; text-align:center; border:none; background:transparent; font-weight:bold; font-size:16px; padding:0;">
                      <button onclick="document.getElementById('qtdModal').value = parseInt(document.getElementById('qtdModal').value)+1" style="width:30px; height:30px; border-radius:5px; border:1px solid #ccc; background:#fff; font-weight:bold;">+</button>
                  </div>
              </div>
              
              <textarea id="obsModal" placeholder="Alguma observação? Ex: Sem cebola, bem passado..." style="width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; height:60px; box-sizing:border-box; font-family:'Poppins'; resize:none;"></textarea>
          `,
          showCancelButton: true,
          confirmButtonColor: '#D88D98',
          cancelButtonColor: '#aaa',
          confirmButtonText: 'Adicionar ao Pedido',
          cancelButtonText: 'Cancelar',
          preConfirm: () => {
              return {
                  qtd: parseInt(document.getElementById('qtdModal').value),
                  obs: document.getElementById('obsModal').value
              }
          }
      }).then((result) => {
          if(result.isConfirmed) {
              carrinho.push({
                  idProduto: p.id,
                  desc: p.nome,
                  valorUnitario: p.valor,
                  valor: p.valor * result.value.qtd, // Total do item
                  qtd: result.value.qtd,
                  ingredientes: p.ingredientes,
                  obsCliente: result.value.obs, // Observação digitada pelo cliente
                  data: new Date().toISOString().split('T')[0],
                  tipo: 'online', // Identifica lá no admin que veio do app
                  pago: false,
                  pagoValor: 0,
                  pronto: false,
                  notificadoAdmin: false
              });
              
              atualizarCarrinhoFlutuante();
              Swal.fire({icon: 'success', title: 'Adicionado!', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500});
          }
      });
  }

  function atualizarCarrinhoFlutuante() {
      let barra = document.getElementById('carrinhoFloat');
      if(carrinho.length === 0) {
          barra.style.display = 'none';
          return;
      }
      
      barra.style.display = 'flex';
      let totalQtd = carrinho.reduce((acc, i) => acc + i.qtd, 0);
      let totalValor = carrinho.reduce((acc, i) => acc + i.valor, 0);
      
      document.getElementById('cartBadge').innerText = totalQtd;
      document.getElementById('cartTotalFloat').innerText = formatarMoeda(totalValor);
  }

  // ================= TELA DE CHECKOUT =================
  function abrirCheckout() {
      document.getElementById('modalCheckout').style.display = 'flex';
      renderizarItensCheckout();
  }

  function fecharCheckout() {
      document.getElementById('modalCheckout').style.display = 'none';
  }

  function renderizarItensCheckout() {
      let div = document.getElementById('listaItensCheckout');
      div.innerHTML = '';
      let total = 0;
      
      carrinho.forEach((item, idx) => {
          total += item.valor;
          let obsHtml = item.obsCliente ? `<div class="item-carrinho-obs">Obs: ${item.obsCliente}</div>` : '';
          
          div.innerHTML += `
              <div class="item-carrinho">
                  <div style="flex:1;">
                      <div class="item-carrinho-nome">${item.qtd}x ${item.desc}</div>
                      ${obsHtml}
                      <div class="item-carrinho-preco">${formatarMoeda(item.valor)}</div>
                  </div>
                  <button class="btn-remove" onclick="removerDoCarrinho(${idx})">Remover</button>
              </div>
          `;
      });
      
      document.getElementById('valorTotalCheckout').innerText = formatarMoeda(total);
      
      if(carrinho.length === 0) {
          fecharCheckout();
          atualizarCarrinhoFlutuante();
      }
  }

  function removerDoCarrinho(idx) {
      carrinho.splice(idx, 1);
      renderizarItensCheckout();
      atualizarCarrinhoFlutuante();
  }

  function mudarModoEntrega() {
      let isDelivery = document.getElementById('modoDelivery').checked;
      if(isDelivery) {
          document.getElementById('areaDelivery').style.display = 'block';
          document.getElementById('areaMesa').style.display = 'none';
      } else {
          document.getElementById('areaDelivery').style.display = 'none';
          document.getElementById('areaMesa').style.display = 'block';
      }
  }
  
  // Mostra campo troco se escolher dinheiro
  document.getElementById('cliPagamento').addEventListener('change', function(e) {
      document.getElementById('areaTroco').style.display = (e.target.value === 'DINHEIRO') ? 'block' : 'none';
  });

  // ================= ENVIAR PEDIDO PARA O BANCO =================
  function enviarPedido() {
      if(carrinho.length === 0) return Swal.fire('Ops', 'Seu carrinho está vazio!', 'warning');

      let isDelivery = document.getElementById('modoDelivery').checked;
      let dadosCliente = { itens: [], tipoCadastro: isDelivery ? 'delivery' : 'mesa' };
      
      let endCompletoStr = "";

      if(!isDelivery) {
          // MESA/LOCAL
          let n = document.getElementById('cliNomeMesa').value.trim();
          if(!n) return Swal.fire('Atenção', 'Informe seu nome ou número da mesa.', 'warning');
          dadosCliente.nome = n.toUpperCase();
          endCompletoStr = "Consumo no Local / Mesa";
      } else {
          // DELIVERY
          let n = document.getElementById('cliNome').value.trim();
          let zap = document.getElementById('cliZap').value.trim();
          let rua = document.getElementById('cliRua').value.trim();
          let bairro = document.getElementById('cliBairro').value.trim();
          let ref = document.getElementById('cliRef').value.trim();
          
          if(!n || !zap || !rua || !bairro) return Swal.fire('Atenção', 'Preencha os campos obrigatórios (Nome, WhatsApp, Rua e Bairro).', 'warning');
          
          dadosCliente.nome = n.toUpperCase();
          dadosCliente.telefone = zap;
          endCompletoStr = `${rua} - ${bairro}`;
          if(ref) endCompletoStr += ` (Ref: ${ref})`;
          dadosCliente.endereco = endCompletoStr;
      }

      // Prepara os itens para salvar
      let pagamentoForma = document.getElementById('cliPagamento').options[document.getElementById('cliPagamento').selectedIndex].text;
      let troco = document.getElementById('cliTroco').value;
      let infoPagamento = pagamentoForma;
      if(document.getElementById('cliPagamento').value === 'DINHEIRO' && troco) infoPagamento += ` (Troco para R$ ${troco})`;

      Swal.fire({title: 'Enviando Pedido...', didOpen: () => Swal.showLoading()});

      // 1. Atualiza o contador de pedidos no Admin
      db.collection("config").doc("empresa").get().then((doc) => {
          let numero = 1;
          if(doc.exists && doc.data().contador) numero = doc.data().contador + 1;
          
          // 2. Associa o número aos itens e junta as observações
          let itensFinais = carrinho.map(i => {
              // Se o cliente digitou uma observação, a gente junta com os ingredientes normais para a cozinha ver
              let ingredFinais = i.ingredientes || '';
              if(i.obsCliente) ingredFinais += ` | OBS: *${i.obsCliente}*`;
              
              return {
                  desc: i.desc, qtd: i.qtd, valor: i.valor, data: i.data, tipo: i.tipo,
                  ingredientes: ingredFinais, numPedido: numero, pago: false, pagoValor: 0, 
                  pronto: false, notificadoAdmin: false
              };
          });
          
          dadosCliente.itens = itensFinais;
          
          // 3. Salva o cliente/pedido no Banco de Dados
          db.collection("clientes").add(dadosCliente).then(() => {
              db.collection("config").doc("empresa").update({"contador": numero});
              
              // 4. Sucesso e envia pro Zap opcional
              carrinho = [];
              atualizarCarrinhoFlutuante();
              fecharCheckout();
              
              Swal.fire({
                  title: 'Pedido Recebido! 🎉',
                  text: 'Sua comanda já está na nossa cozinha.',
                  icon: 'success',
                  showCancelButton: true,
                  confirmButtonColor: '#4CAF50',
                  cancelButtonColor: '#888',
                  confirmButtonText: 'Avisar no WhatsApp',
                  cancelButtonText: 'Fechar'
              }).then((result) => {
                  if (result.isConfirmed && foneLoja) {
                      let textoZap = `*NOVO PEDIDO (ONLINE)* 🍔\n\n*Cliente:* ${dadosCliente.nome}\n*Modo:* ${isDelivery ? 'Delivery 🛵' : 'Mesa/Local 🪑'}\n*Endereço:* ${endCompletoStr}\n*Pagamento:* ${infoPagamento}\n\n*Itens:*`;
                      itensFinais.forEach(i => {
                          textoZap += `\n- ${i.qtd}x ${i.desc} (R$ ${i.valor.toFixed(2)})`;
                      });
                      let url = `https://wa.me/55${foneLoja}?text=${encodeURIComponent(textoZap)}`;
                      window.open(url, '_blank');
                  }
              });
          });
      });
  }

  // Helpers
  function formatarMoeda(v) { return Number(v).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'}); }

  function buscarCepDelivery() {
      let cep = document.getElementById('cliCep').value.replace(/\D/g, ''); 
      if (cep.length === 8) {
          fetch(`https://viacep.com.br/ws/${cep}/json/`).then(r => r.json()).then(d => { 
              if(!d.erro) {
                  document.getElementById('cliBairro').value = d.bairro || ''; 
                  document.getElementById('cliRua').value = d.logradouro || ''; 
                  document.getElementById('cidade').value = `${d.localidade}/${d.uf}`;
              }
          });
      }
  }

  // START
  window.onload = carregarDadosLoja;

</script>
</body>
</html>
